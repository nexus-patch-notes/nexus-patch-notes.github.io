    <script>
        const btn = document.getElementById('BackToTop');

    // Show/Hide on scroll
    window.addEventListener('scroll', () => {
        if (window.scrollY > 150) {
            btn.classList.add('show');
        } else {
            btn.classList.remove('show');
        }
    });

    // Smooth scroll to top
    btn.addEventListener('click', () => {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });
    </script>
    <script>
        const legendClasses = ['ptr-to-live', 'reverted', 'undocumented'];

    legendClasses.forEach(cls => {
        const legendItems = document.querySelectorAll(`.legend .${cls}`);

        legendItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                const nextItem = legendItems[index + 1] || legendItems[0];
                nextItem.scrollIntoView({ behavior: 'smooth' });
            });
        });
    });
    </script>
