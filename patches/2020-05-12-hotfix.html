    <script>
        const btn = document.getElementById('BackToTop');

    // Show/Hide on scroll
    window.addEventListener('scroll', () => {
        if (window.scrollY > 150) {
            btn.classList.add('show');
        } else {
            btn.classList.remove('show');
        }
    });

    // Smooth scroll to top
    btn.addEventListener('click', () => {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });
    </script>
    <script>
        const legendClasses = ['ptr-to-live', 'reverted', 'undocumented'];

    legendClasses.forEach(cls => {
        const legendItems = document.querySelectorAll(`.legend .${cls}`);

        legendItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                const nextItem = legendItems[index + 1] || legendItems[0];
                nextItem.scrollIntoView({ behavior: 'smooth' });
            });
        });
    });
    </script>
    <script>
        const CATEGORIES = ['general', 'battlegrounds', 'heroes'];
    const STORAGE_KEY = 'collapsible-sections';
    const DEFAULT_STATES = Object.fromEntries(CATEGORIES.map(c => [c, 'expanded']));

    function loadStates() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? { ...DEFAULT_STATES, ...JSON.parse(saved) } : DEFAULT_STATES;
        } catch {
            return DEFAULT_STATES;
        }
    }

    function saveStates(states) {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
        } catch {
            // Fail silently when storage unavailable (e.g. private browsing quota exceeded)
        }
    }

    function toggleSection(category) {
        document.querySelectorAll('.' + category + '-section').forEach(el => {
            el.classList.toggle('hidden');
        });

        document.querySelectorAll('.' + category + '-label').forEach(el => {
            el.classList.toggle('collapsed');
        });

        const isCollapsed = document.querySelector('.' + category + '-section').classList.contains('hidden');
        const states = loadStates();
        states[category] = isCollapsed ? 'collapsed' : 'expanded';
        saveStates(states);
    }

    function restoreSectionStates() {
        const states = loadStates();
        CATEGORIES.forEach(category => {
            if (states[category] === 'collapsed') {
                document.querySelectorAll('.' + category + '-section').forEach(el => {
                    el.classList.add('hidden');
                });
                document.querySelectorAll('.' + category + '-label').forEach(el => {
                    el.classList.add('collapsed');
                });
            }
        });
    }

    document.addEventListener('DOMContentLoaded', restoreSectionStates);
    </script>
